<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ATMAN OS · WAVE CHART</title>
<style>
  :root{
    --navy:#0F1B2D; --navy-line:#22354f; --accent:#4DA3FF;
    --ink:#0F1B2D; --body:#F4F6F9; --card:#FFFFFF; --card-line:#E3E8EF;
    --muted:#6B7787; --muted-2:#9AA6B5;
    /* 캔들 색 (기본=한국식: 상승 빨강 / 하락 파랑) — 영문(서구식)에서는 JS가 덮어씀 */
    --c-up:#E5494D; --c-dn:#2E73E8;
    /* 과열/침체 음영색은 캔들색과 분리(언어 무관 고정): 과열=난색, 침체=한색 */
    --zone-hot:#E5494D; --zone-cold:#2E73E8;
    --b-up:#C2410C; --b-mid:#7A8699; --b-dn:#0E8A9C;
    --b-a:#7C3AED; --b-b:#0E9F6E;
    --osc-rsi:#7C3AED; --osc-stoch:#E8590C;
    --mono:"SF Mono",ui-monospace,"JetBrains Mono","Roboto Mono",Menlo,monospace;
    --sans:system-ui,-apple-system,"Segoe UI","Apple SD Gothic Neo","Pretendard",sans-serif;
  }
  *{box-sizing:border-box} html,body{margin:0}
  body{background:var(--body);color:var(--ink);font-family:var(--sans);-webkit-font-smoothing:antialiased}
  header{background:var(--navy);color:#fff;border-bottom:1px solid var(--navy-line);position:sticky;top:0;z-index:20}
  .topbar{display:flex;align-items:baseline;gap:14px;padding:14px 20px 10px}
  .sym-code{font-family:var(--mono);font-size:12px;letter-spacing:.12em;color:var(--accent)}
  .sym-name{font-size:18px;font-weight:650;letter-spacing:-.01em}
  .sym-meta{margin-left:auto;font-family:var(--mono);font-size:11px;color:#7d8ba0;letter-spacing:.04em}
  .tabs{display:flex;gap:2px;padding:0 12px;overflow-x:auto;scrollbar-width:none}
  .tabs::-webkit-scrollbar{display:none}
  .tab{appearance:none;background:transparent;border:0;border-bottom:2px solid transparent;color:#8ea0b8;
       font-family:var(--sans);font-size:13px;font-weight:550;padding:9px 14px;cursor:pointer;white-space:nowrap;
       transition:color .15s,border-color .15s}
  .tab .sub{display:block;font-family:var(--mono);font-size:10px;font-weight:400;color:#5d6e85;margin-top:2px;letter-spacing:.02em}
  .tab .sub:empty{display:none}
  .tab:hover{color:#cdd8e6}
  .tab[aria-selected="true"]{color:#fff;border-bottom-color:var(--accent)}
  .tab[aria-selected="true"] .sub{color:var(--accent)}
  .tab:focus-visible{outline:2px solid var(--accent);outline-offset:-2px;border-radius:4px}
  main{max-width:1180px;margin:0 auto;padding:20px 16px 60px}
  .stack{display:flex;flex-direction:column;gap:16px}
  .chart-card{background:var(--card);border:1px solid var(--card-line);border-radius:12px;overflow:hidden;box-shadow:0 1px 2px rgba(15,27,45,.04)}
  .chart-head{display:flex;align-items:center;gap:10px;padding:11px 14px;border-bottom:1px solid var(--card-line)}
  .wave-chip{display:inline-flex;align-items:center;gap:7px;font-weight:650;color:var(--ink)}
  .wave-dot{border-radius:50%;background:var(--navy);flex:0 0 auto}
  .tier-L .wave-dot{width:13px;height:13px}.tier-M .wave-dot{width:10px;height:10px;background:#3a506b}.tier-S .wave-dot{width:7px;height:7px;background:#6B7787}
  .tier-L .wave-name{font-size:15px}.tier-M .wave-name{font-size:14px}.tier-S .wave-name{font-size:13px}
  .wave-code{font-family:var(--mono);font-size:10px;color:var(--muted-2);letter-spacing:.08em}
  .legend{margin-left:auto;display:flex;flex-wrap:wrap;gap:11px;font-family:var(--mono);font-size:10.5px;color:var(--muted)}
  .lg{display:inline-flex;align-items:center;gap:5px}
  .lg i{width:14px;height:0;border-top:2px solid currentColor;display:inline-block}
  .lg .ax{color:var(--muted-2);font-size:9px}
  .lg.note{color:var(--muted-2)}
  .chart-wrap{width:100%;height:460px;position:relative}
  .anchor-card{border-color:#cdd8e6;box-shadow:0 2px 6px rgba(15,27,45,.07)}
  .anchor-badge{font-family:var(--mono);font-size:10px;letter-spacing:.04em;color:#fff;background:var(--navy);padding:2px 9px;border-radius:99px}
  .anchor-wrap{width:100%;height:300px;position:relative}
  .empty{padding:40px;text-align:center;color:var(--muted);font-size:13px}
  @media (prefers-reduced-motion:reduce){*{transition:none!important}}

  /* ===== 모바일: 상단/헤더/차트 높이 축소 ===== */
  @media (max-width:640px){
    .topbar{padding:10px 14px 6px;gap:9px}
    .sym-name{font-size:15px}
    .sym-code{font-size:11px}
    .sym-meta{display:none}
    .tabs{padding:0 8px}

    .tab .sub{font-size:9px}
    main{padding:12px 9px 40px}
    .stack{gap:12px}
    .chart-head{padding:9px 11px}
    .legend{display:none}
    .chart-wrap{height:340px}
    .anchor-wrap{height:200px}
    .data-notice{font-size:11.5px;padding:9px 11px;margin-bottom:12px}
    .wave-code{display:none}
  }

  /* ===== 시장데이터 고지 ===== */
  .data-notice{display:flex;gap:10px;align-items:flex-start;margin-bottom:16px;padding:11px 14px;
    background:#FFF7E6;border:1px solid #F2D9A0;border-left:3px solid #D98E04;border-radius:10px;
    font-size:12.5px;line-height:1.55;color:#7A5A12}

  /* ===== provenance ===== */

  .prov-head{display:flex;align-items:center;gap:9px;padding:11px 14px;border-bottom:1px solid var(--card-line);font-size:13px;font-weight:650;color:var(--ink)}

  .prov-table td{padding:5px 8px;color:var(--ink);border-bottom:1px solid #F0F3F7}
  .prov-meta{margin-top:12px;display:flex;flex-direction:column;gap:7px;font-size:11.5px;color:var(--muted)}

  .prov-hash{font-family:var(--mono);font-size:10.5px;word-break:break-all;color:var(--ink)}
  .prov-chips{display:inline-flex;flex-wrap:wrap;gap:6px}
  .prov-chip{font-family:var(--mono);font-size:10px;padding:2px 7px;border:1px solid var(--card-line);border-radius:99px;color:var(--muted)}
  .prov-disc{margin-top:13px;padding-top:11px;border-top:1px dashed var(--card-line);font-size:11px;line-height:1.6;color:var(--muted-2)}
  .prov-disc b{color:var(--muted)}

  .state{max-width:1180px;margin:0 auto;padding:40px 16px}
  .loading{display:flex;align-items:center;gap:12px;color:var(--muted);font-size:13px;padding:30px 14px;

  .helpcard{background:var(--card);border:1px solid var(--card-line);border-radius:12px;padding:18px;color:var(--ink)}

  .hidden{display:none!important}

/* ---------- 0) CDN 라이브러리 로드 (실패 시 대체 CDN) ---------- */
const LIB_SRCS=[
  'https://cdnjs.cloudflare.com/ajax/libs/lightweight-charts/5.2.0/lightweight-charts.standalone.production.js',
  'https://unpkg.com/lightweight-charts@5.2.0/dist/lightweight-charts.standalone.production.js',
];
function loadLib(srcs){
  return new Promise((resolve,reject)=>{
    let i=0;
    (function next(){
      if(i>=srcs.length){ reject(new Error('차트 라이브러리 CDN 로드 실패')); return; }
      const s=document.createElement('script');
      s.src=srcs[i++]; s.async=true;
      s.onload=()=>resolve(); s.onerror=()=>next();
      document.head.appendChild(s);
    })();
  });
}

/* ---------- 1) URL 파라미터 + 같은 출처 검증 ---------- */
function resolveSameOrigin(dataUrl){
  const u=new URL(dataUrl, location.href);
  if(u.origin!==location.origin){ const e=new Error('cross-origin'); e.code='CROSS_ORIGIN'; e.url=u.href; e.origin=u.origin; throw e; }
  return u.href;
}
function symbolFromUrl(url){
  try{
    const path=new URL(url, location.href).pathname;
    const file=decodeURIComponent((path.split('/').pop()||''));
    const base=file.replace(/\.[^.]+$/,'');
    const parts=base.split('_');
    return {code:parts[0]||'', name:parts.slice(1).join('_')||base};
  }catch(e){ return {code:'',name:''}; }
}

/* ---------- 2) .txt 파서 ([ind / WAVE] 섹션 + 선택적 [meta]) ---------- */
function parseTxt(text){
  const lines=text.split(/\r?\n/);
  const indicators={};
  const meta={};
  let cur=null, metaMode=false;
  const openRe=/^\[([^/\]]+?)\s*\/\s*([^\]]+?)\]$/;
  const closeRe=/^\[\/(.+?)\s*\/\s*(.+?)\]$/;
  for(const raw of lines){
    const line=raw.trim();
    if(!line) continue;
    if(line==='[meta]'){ metaMode=true; cur=null; continue; }
    if(line==='[/meta]'){ metaMode=false; continue; }
    if(metaMode){ const i=line.indexOf(','); if(i>0) meta[line.slice(0,i).trim().toLowerCase()]=line.slice(i+1).trim(); continue; }
    if(closeRe.test(line)){ if(cur){ (indicators[cur.ind]=indicators[cur.ind]||{})[cur.wave]={columns:cur.columns,rows:cur.rows}; cur=null; } continue; }
    const m=line.match(openRe);
    if(m){ cur={ind:m[1].trim(),wave:m[2].trim(),columns:null,rows:[]}; continue; }
    if(cur){ const cells=line.split(','); if(cur.columns===null) cur.columns=cells.map(c=>c.trim()); else cur.rows.push(cells); }
  }
  if(cur){ (indicators[cur.ind]=indicators[cur.ind]||{})[cur.wave]={columns:cur.columns,rows:cur.rows}; }
  return {indicators, meta};
}

/* ---------- 3) SHA-256 ---------- */
async function sha256Hex(buf){
  if(!(window.crypto&&crypto.subtle)) return null;
  const h=await crypto.subtle.digest('SHA-256', buf);
  return [...new Uint8Array(h)].map(b=>b.toString(16).padStart(2,'0')).join('');
}

const OVERLAY={

  slope_bb:      [['slope_u','up'],['slope_m','mid'],['slope_l','dn']],
  sr_band:       [['sr_up','up'],['sr_mid','mid'],['sr_down','dn']],

const OVERLAY_LABEL={
  upbb_u:'UpBB↑',upbb_m:'UpBB·',upbb_l:'UpBB↓',slope_u:'Slope↑',slope_m:'Slope·',slope_l:'Slope↓',
  sr_up:'SR↑',sr_mid:'SR·',sr_down:'SR↓',hma20:'HMA',ema20:'EMA',ap1:'AP1',ap2:'AP2',

};
const drawOsc=k=>k!=='fund_updown_bb';

/* ================= helpers ================= */
const css=v=>getComputedStyle(document.documentElement).getPropertyValue(v).trim();
const isMobile=()=>window.matchMedia('(max-width:640px)').matches;
let LOCALE='ko-KR';
let PRICE_DEC=0;   // 가격 소수 자릿수 — 데이터에서 자동 감지(한국=0, 미국=2 등)
// '기준 일봉'(raw_daily 있으면 그것, 없으면 대파동) 종가의 의미있는 소수 자릿수만 감지.
// 중·소파동은 평균봉이라 .333 같은 인위적 소수가 생기므로 제외 → 종목 실제 호가단위 기준.
function detectDecimals(){
  const src=pickAnchorSrc(); if(!src)return 0;
  const ci=src.columns.indexOf('close'); if(ci<0)return 0;
  let dec=0;
  for(const r of src.rows){
    const v=parseFloat(r[ci]); if(!Number.isFinite(v))continue;
    const frac=v.toString().split('.')[1];           // 끝의 0 제거 후 실제 소수 자릿수
    if(frac) dec=Math.max(dec, frac.replace(/0+$/,'').length);
    if(dec>=4) return 4;
  }
  return Math.min(dec,4);
}
const decOpts=()=>({minimumFractionDigits:PRICE_DEC,maximumFractionDigits:PRICE_DEC});
// 데스크탑=천단위 콤마(+소수) / 모바일=1000 이상만 축약, 1000 미만(미국주가 대부분)은 소수 그대로
function priceComma(p){ return p.toLocaleString(LOCALE, decOpts()); }
function priceCompact(p){
  const a=Math.abs(p), s=p<0?'-':'';
  if(a>=1e6) return s+(a/1e6).toFixed(a>=1e7?0:1).replace(/\.0$/,'')+'M';
  if(a>=1e3) return s+(a/1e3).toFixed(a>=1e4?0:1).replace(/\.0$/,'')+'K';
  return s+a.toLocaleString(LOCALE, decOpts());
}
const priceFmt=()=>isMobile()?priceCompact:priceComma;
const priceFormatOpt=()=>({type:'custom', minMove:PRICE_DEC>0?1/Math.pow(10,PRICE_DEC):1, formatter:priceFmt()});
// 패널 높이를 stretch로 결정 → 대/중파동의 RSI 영역 높이가 동일하게 맞음
function layoutPanes(chart, container, oscPane, volPane){
  const H=(container&&container.clientHeight)||460, oscH=92, volH=66;
  const panes=chart.panes();
  const used=(oscPane!=null?oscH:0)+(volPane!=null?volH:0);
  if(panes[0]) panes[0].setStretchFactor(Math.max(80, H-used));
  if(oscPane!=null && panes[oscPane]) panes[oscPane].setStretchFactor(oscH);
  if(volPane!=null && panes[volPane]) panes[volPane].setStretchFactor(volH);
}
function toTime(dt){
  const [d,t]=dt.trim().split(' ');
  const [Y,M,D]=d.split('-').map(Number);
  let h=0,mi=0; if(t){const p=t.split(':'); h=Number(p[0])||0; mi=Number(p[1])||0;}
  return Math.floor(Date.UTC(Y,M-1,D,h,mi)/1000);
}
const colIdx=(b,n)=>b.columns.indexOf(n);
const num=v=>{const n=parseFloat(v);return Number.isFinite(n)?n:null;};
function candleBlock(indKey,wave){
  return indKey==='fund_updown_bb'
    ? {block:DATA.indicators.fund_updown_bb[wave],fund:true}
    : {block:DATA.indicators.updown_bb[wave],fund:false};
}
function buildCandles(block,fund){
  const p=fund?'fund_':'';
  const ti=colIdx(block,'datetime'),oi=colIdx(block,p+'open'),hi=colIdx(block,p+'high'),
        li=colIdx(block,p+'low'),ci=colIdx(block,p+'close'),vi=colIdx(block,p+'volume');
  const hasVol=vi>=0;   // WAVE_M/WAVE_S 등 volume 컬럼이 없을 수 있음
  const seen=new Set(),candles=[],vols=[],times=[];
  for(const r of block.rows){
    const t=toTime(r[ti]); if(seen.has(t))continue; seen.add(t);
    const o=num(r[oi]),h=num(r[hi]),l=num(r[li]),c=num(r[ci]);
    candles.push({time:t,open:o,high:h,low:l,close:c});
    if(hasVol) vols.push({time:t,value:num(r[vi])||0,color:(c>=o?css('--c-up'):css('--c-dn'))+'AA'});
    times.push(t);
  }
  candles.sort((a,b)=>a.time-b.time);vols.sort((a,b)=>a.time-b.time);
  return {candles,vols,times};
}
function buildLine(block,times,colName){
  const ci=colIdx(block,colName); if(ci<0)return [];
  const out=[];
  for(let k=0;k<times.length&&k<block.rows.length;k++){ const v=num(block.rows[k][ci]); if(v!==null)out.push({time:times[k],value:v}); }
  return out;
}
const lock0to100={autoscaleInfoProvider:()=>({priceRange:{minValue:0,maxValue:100}})};

/* ---------- 차트 레지스트리 + 보이는 범위 적용(모바일=최근 N봉, 데스크탑=전체) ---------- */
let anchorRef=null;      // {chart,len}
let stackRefs=[];        // [{chart,len}]
function applyView(chart,len){
  const ts=chart.timeScale();
  if(isMobile() && len>MOBILE_BARS) ts.setVisibleLogicalRange({from:len-MOBILE_BARS-0.5, to:len-0.5});
  else ts.fitContent();
}
function applyAllViews(){
  if(anchorRef) applyView(anchorRef.chart, anchorRef.len);
  for(const r of stackRefs) applyView(r.chart, r.len);
}

/* ================= render one wave chart ================= */
function renderChart(container,indKey,wave){
  const {block:cBlock,fund}=candleBlock(indKey,wave);
  if(!cBlock){container.innerHTML=`<div class="empty">${T().empty}</div>`;return null;}
  const {candles,vols,times}=buildCandles(cBlock,fund);
  const overlays=OVERLAY[indKey]||[];
  const osc=drawOsc(indKey);
  const showVol=WAVE_TIER[wave]==='L';

  let pi=1;
  const oscPane=osc?pi++:null;
  const volPane=showVol?pi++:null;

  const chart=LightweightCharts.createChart(container,{
    autoSize:true,
    layout:{background:{color:'#fff'},textColor:'#5b6675',fontFamily:css('--mono'),fontSize:isMobile()?9:11,
            panes:{separatorColor:'#E3E8EF',separatorHoverColor:'#cfd8e3',enableResize:false}},
    grid:{vertLines:{color:'#F0F3F7'},horzLines:{color:'#F0F3F7'}},
    rightPriceScale:{borderColor:'#E3E8EF',scaleMargins:{top:0.08,bottom:0.08}},
    leftPriceScale:{visible:false},
    timeScale:{borderColor:'#E3E8EF',timeVisible:true,secondsVisible:false},
    crosshair:{mode:LightweightCharts.CrosshairMode.Normal},
    localization:{locale:LOCALE},
  });

  if(osc){
    const src=DATA.indicators.updown_bb[wave];
    const rsiArr=buildLine(src,times,'rsi');
    const stMap=new Map(buildLine(src,times,'stoch').map(p=>[p.time,p.value]));
    const zoneData=rsiArr.map(p=>{
      const r=p.value, s=stMap.has(p.time)?stMap.get(p.time):null;
      let ob=(r>=OSC_TH.rsi.ob?1:0), os=(r<=OSC_TH.rsi.os?1:0);
      if(s!=null){ ob+=(s>=OSC_TH.stoch.ob?1:0); os+=(s<=OSC_TH.stoch.os?1:0); }
      if(ob>os) return {time:p.time,value:1,color:css('--zone-hot')+(ob>=2?ZONE_ALPHA.strong:ZONE_ALPHA.light)};
      if(os>ob) return {time:p.time,value:1,color:css('--zone-cold')+(os>=2?ZONE_ALPHA.strong:ZONE_ALPHA.light)};
      return {time:p.time,value:0,color:'rgba(0,0,0,0)'};
    });
    const zone=chart.addSeries(LightweightCharts.HistogramSeries,
      {priceScaleId:'zone',base:0,priceLineVisible:false,lastValueVisible:false,
       autoscaleInfoProvider:()=>({priceRange:{minValue:0,maxValue:1}})},0);
    zone.setData(zoneData);
    chart.priceScale('zone').applyOptions({scaleMargins:{top:0,bottom:0}});
  }

  const cs=chart.addSeries(LightweightCharts.CandlestickSeries,{
    priceScaleId:'right',
    priceFormat:priceFormatOpt(),
    upColor:css('--c-up'),downColor:css('--c-dn'),
    borderUpColor:css('--c-up'),borderDownColor:css('--c-dn'),
    wickUpColor:css('--c-up'),wickDownColor:css('--c-dn'),
  },0);
  cs.setData(candles);

  const oBlock=fund?cBlock:DATA.indicators[indKey][wave];
  for(const [colName,colKey] of overlays){
    const ls=chart.addSeries(LightweightCharts.LineSeries,{
      priceScaleId:'right',color:css(COLORMAP[colKey]),lineWidth:colKey==='mid'?1:2,
      lineStyle:colKey==='mid'?2:0,priceLineVisible:false,lastValueVisible:false,
      priceFormat:priceFormatOpt(),
    },0);
    ls.setData(buildLine(oBlock,times,colName));
  }

  if(osc){
    const src=DATA.indicators.updown_bb[wave];
    const rsi=chart.addSeries(LightweightCharts.LineSeries,
      {color:css('--osc-rsi'),lineWidth:1.4,priceLineVisible:false,lastValueVisible:true,...lock0to100},oscPane);
    rsi.setData(buildLine(src,times,'rsi'));
    const st=chart.addSeries(LightweightCharts.LineSeries,
      {color:css('--osc-stoch'),lineWidth:1.4,priceLineVisible:false,lastValueVisible:true,...lock0to100},oscPane);
    st.setData(buildLine(src,times,'stoch'));
    rsi.createPriceLine({price:80,color:css('--zone-hot')+'66',lineWidth:1,lineStyle:1,axisLabelVisible:false});
    rsi.createPriceLine({price:70,color:css('--zone-hot')+'99',lineWidth:1,lineStyle:2,axisLabelVisible:false});
    rsi.createPriceLine({price:30,color:css('--zone-cold')+'99',lineWidth:1,lineStyle:2,axisLabelVisible:false});
    rsi.createPriceLine({price:20,color:css('--zone-cold')+'66',lineWidth:1,lineStyle:1,axisLabelVisible:false});
  }

  if(showVol){
    const vs=chart.addSeries(LightweightCharts.HistogramSeries,
      {priceFormat:{type:'volume'},priceLineVisible:false,lastValueVisible:false},volPane);
    vs.setData(vols);
  }

  layoutPanes(chart, container, oscPane, volPane);
  applyView(chart, candles.length);
  return {chart, len:candles.length};
}

/* ================= 기준 일봉 닻 차트 ================= */
// 우선순위: raw_daily/RAW(진짜 원본 일봉) → 없으면 updown_bb/WAVE_L(대파동) 폴백
function pickAnchorSrc(){
  const ind=DATA.indicators||{};
  const raw=ind.raw_daily && ind.raw_daily.RAW;
  if(raw && raw.rows && raw.rows.length>0) return raw;   // 행이 실제로 있을 때만 원본 사용
  if(ind.updown_bb && ind.updown_bb.WAVE_L) return ind.updown_bb.WAVE_L;  // 없거나 비어있으면 대파동 폴백
  return null;
}
function renderAnchor(){

    grid:{vertLines:{color:'#F0F3F7'},horzLines:{color:'#F0F3F7'}},
    rightPriceScale:{borderColor:'#E3E8EF',scaleMargins:{top:0.08,bottom:0.08}},
    leftPriceScale:{visible:false},
    timeScale:{borderColor:'#E3E8EF',timeVisible:true,secondsVisible:false},
    crosshair:{mode:LightweightCharts.CrosshairMode.Normal},

  });
  const cs=chart.addSeries(LightweightCharts.CandlestickSeries,{
    priceScaleId:'right',

    upColor:css('--c-up'),downColor:css('--c-dn'),

  },0);
  cs.setData(candles);

      lineStyle:colKey==='mid'?2:0,priceLineVisible:false,lastValueVisible:false,
      priceFormat:priceFormatOpt(),
    },0);
    ls.setData(buildLine(src,times,colName));
  }
  const vs=chart.addSeries(LightweightCharts.HistogramSeries,
    {priceFormat:{type:'volume'},priceLineVisible:false,lastValueVisible:false},1);

  const p1=chart.panes()[1]; if(p1)p1.setHeight(56);

/* ================= stack ================= */
function selectIndicator(indKey){
  stackRefs.forEach(r=>{try{r.chart.remove();}catch(e){}}); stackRefs=[];
  const stack=document.getElementById('stack');stack.innerHTML='';
  document.querySelectorAll('.tab').forEach(t=>t.setAttribute('aria-selected',t.dataset.key===indKey));

  for(const wave of ordered){

    const tier=WAVE_TIER[wave];

      <div class="chart-head">

/* ================= provenance ================= */
let PROVENANCE={algo:'SHA-256', hash:'', built:''};
function medInterval(blk){
  const ti=colIdx(blk,'datetime');
  const ts=blk.rows.map(r=>toTime(r[ti])).sort((a,b)=>a-b);
  const dif=[]; for(let i=1;i<ts.length;i++)dif.push(ts[i]-ts[i-1]);
  dif.sort((a,b)=>a-b); return dif[Math.floor(dif.length/2)]||0;
}
function compLabel(med,base){ if(!med)return '–'; const r=Math.round(base/med); return r<=1?T().compBase:T().compFrac(r); }
function asOf(){
  let best=-Infinity,raw='';
  for(const ind of ['updown_bb','fund_updown_bb']){
    const waves=DATA.indicators[ind]||{};
    for(const w in waves){ const blk=waves[w],ti=colIdx(blk,'datetime'); const last=blk.rows[blk.rows.length-1][ti],t=toTime(last); if(t>best){best=t;raw=last;} }
  }
  const [d,tt]=raw.trim().split(' ');
  let hm='00:00'; if(tt){const p=tt.split(':');hm=(p[0]||'00').padStart(2,'0')+':'+((p[1]||'00').padStart(2,'0'));}
  return d+' '+hm;
}
function renderProvenance(){
  const order=[['updown_bb','WAVE_L'],['updown_bb','WAVE_M'],['updown_bb','WAVE_S'],['fund_updown_bb','FUND_WAVE_L']];
  const baseBlk=DATA.indicators.updown_bb&&DATA.indicators.updown_bb.WAVE_L;
  const base=baseBlk?medInterval(baseBlk):86400;
  const rows=[];
  for(const [ind,w] of order){
    const blk=DATA.indicators[ind]&&DATA.indicators[ind][w]; if(!blk)continue;
    rows.push(`<tr><td>${T().wave[w]||w}</td><td>${compLabel(medInterval(blk),base)}</td><td>${blk.rows.length}${T().sampleUnit}</td></tr>`);
  }
  const chips=IND_KEYS.map(k=>`<span class="prov-chip">${T().ind[k][0]}</span>`).join('');
  const c=T().provCols;
  document.getElementById('prov').innerHTML=`
    <div class="prov-head"><span class="seal">&#10003;</span>${T().provHead}</div>
    <div class="prov-body">
      <table class="prov-table">
        <thead><tr><th>${c[0]}</th><th>${c[1]}</th><th>${c[2]}</th></tr></thead>
        <tbody>${rows.join('')}</tbody>
      </table>
      <div class="prov-meta">
        <div><span class="k">${T().metaSource}</span>${T().source}</div>
        <div><span class="k">${T().metaIndic}</span><span class="prov-chips">${chips}</span></div>
        <div><span class="k">${T().metaHash}</span><span class="prov-hash">${PROVENANCE.algo} · ${PROVENANCE.hash}</span></div>
        <div><span class="k">${T().metaAsOf}</span>${asOf()} <span style="color:var(--muted-2)">${T().asOfTail}</span></div>
        <div><span class="k">${T().metaBuilt}</span>${PROVENANCE.built}</div>
      </div>
      <p class="prov-disc">${T().disc} <b>${PROVENANCE.algo}</b></p>
    </div>`;
}

function escapeHtml(s){return String(s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}
function fmtNowKST(){
  const d=new Date();
  const k=new Date(d.getTime()+(9*60+d.getTimezoneOffset())*60000);
  const p=n=>String(n).padStart(2,'0');
  return `${k.getFullYear()}-${p(k.getMonth()+1)}-${p(k.getDate())} ${p(k.getHours())}:${p(k.getMinutes())} KST`;
}

/* ---------- 부트스트랩 ---------- */
async function boot(){
  const qs=new URLSearchParams(location.search);
  LANG=(qs.get('lang')||'ko').toLowerCase()==='en'?'en':'ko';
  MOBILE_BARS=Math.max(8, +(qs.get('mbars'))||36);
  LOCALE=LANG==='en'?'en-US':'ko-KR';

  // 언어 적용: html lang, 제목, 캔들색(영문=서구식 상승 초록/하락 빨강)
  document.documentElement.lang=T().htmlLang;
  document.title=T().title;
  if(LANG==='en'){
    const r=document.documentElement.style;
    r.setProperty('--c-up','#16A34A');   // green up
    r.setProperty('--c-dn','#DC2626');   // red down
  }
  setLoading(T().loadData);

  const dataUrlParam=qs.get('dataUrl');
  if(!dataUrlParam){ showHelp(); return; }

  let url;
  try{ url=resolveSameOrigin(dataUrlParam); }
  catch(e){ showError(T().errCrossT, T().errCross(escapeHtml(e.url||dataUrlParam), escapeHtml(location.origin))); return; }

  try{
    setLoading(T().loadLib);
    const libP=loadLib(LIB_SRCS);

    setLoading(T().loadData);
    const res=await fetch(url,{cache:'no-store'});
    if(!res.ok) throw Object.assign(new Error('http'), {code:'HTTP', status:res.status, url});
    const buf=await res.arrayBuffer();
    const text=new TextDecoder('utf-8').decode(buf);

    setLoading(T().loadParse);
    const {indicators, meta}=parseTxt(text);
    if(!indicators.updown_bb) throw Object.assign(new Error('parse'), {code:'PARSE', url});

    // 심볼 우선순위: URL 파라미터 > 파일 [meta] > 파일명
    const symFromFile=symbolFromUrl(url);
    DATA={
      symbol_code: qs.get('code')||meta.code||symFromFile.code,
      symbol_name: qs.get('name')||meta.name||symFromFile.name,
      indicators, __url:url,
    };
    PRICE_DEC=detectDecimals();   // 가격 소수 자릿수 자동 감지(KR=0 / US=2 등)

    await libP;

    setLoading(T().loadHash);
    const hash=await sha256Hex(buf);
    PROVENANCE.hash = hash || 'N/A';
    PROVENANCE.built = fmtNowKST();

    renderUI();
  }catch(e){
    if(e.code==='HTTP') showError(T().errHttpT, T().errHttp(e.status, escapeHtml(e.url)));
    else if(e.code==='PARSE') showError(T().errParseT, T().errParse(escapeHtml(e.url)));
    else showError(T().errGenT, T().errGen(escapeHtml(e.message||String(e))));
  }
}

/* ---------- 렌더 진입 ---------- */
function renderUI(){
  document.getElementById('symCode').textContent=DATA.symbol_code;
  document.getElementById('symName').textContent=DATA.symbol_name;
  const nb=(DATA.indicators.updown_bb&&DATA.indicators.updown_bb.WAVE_L)?DATA.indicators.updown_bb.WAVE_L.rows.length:'';
  document.getElementById('symMeta').textContent=T().symMeta(nb);
  document.getElementById('noticeText').innerHTML=T().notice;

  const tabsEl=document.getElementById('tabs'); tabsEl.innerHTML='';
  IND_KEYS.forEach(key=>{
    if(!DATA.indicators[key]) return;
    const [label,sub]=T().ind[key];
    const b=document.createElement('button');
    b.className='tab';b.dataset.key=key;b.setAttribute('role','tab');
    b.innerHTML=`${label}<span class="sub">${sub||''}</span>`;
    b.onclick=()=>selectIndicator(key);
    tabsEl.appendChild(b);
  });

  hideState();
  document.getElementById('mainBox').classList.remove('hidden');

  renderAnchor();
  const first=IND_KEYS.find(k=>DATA.indicators[k]);
  if(first) selectIndicator(first);
  renderProvenance();

  // 레이아웃 안정화 후 보이는 범위/높이 재확정
  setTimeout(()=>{ applyAllViews(); postHeight(); }, 80);
  setTimeout(()=>{ applyAllViews(); postHeight(); }, 420);
}

boot();
</script>
</body>
